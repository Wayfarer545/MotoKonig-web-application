stages:
  - lint
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375/
  AUTO_DEVOPS_PLATFORM_TARGET: EC2
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"

cache:
  paths:
    - .uv-cache/
    - uv.lock

# Линтинг
lint:
  stage: lint
  image: python:3.12-slim
  rules:
    - changes:
        - "app/**/*"
        - "migrations/**/*"
        - "tests/**/*"
        - "pyproject.toml"
        - "docker/**/*"
    - when: never
  script:
    - pip install --no-cache-dir uv ruff
    - ruff check app/
  allow_failure: true

test:
  stage: test
  image: python:3.12-slim
  rules:
    - changes:
        - "app/**/*"
        - "tests/**/*"
        - "migrations/**/*"
        - "pyproject.toml"
        - "docker/**/*"
    - when: never
  script:
    - pip install --no-cache-dir uv
    - uv pip install -e ".[dev]"
    - pytest tests/ -v --cov=app --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  allow_failure: true

# Сборка образа
build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v(?:\d+.){2}(?:\d+)-release$/
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE:latest" -f docker/Dockerfile .
    - docker push "$CI_REGISTRY_IMAGE:latest"

# Деплой
deploy:
  stage: deploy
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v(?:\d+\.){2}\d+-release$/'
  before_script:
    - apk add --no-cache openssh
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan ec2-3-71-173-220.eu-central-1.compute.amazonaws.com >> ~/.ssh/known_hosts
  script:
    - |
      ssh -o StrictHostKeyChecking=no ec2-user@ec2-3-71-173-220.eu-central-1.compute.amazonaws.com <<'EOF'
        set -e
        cd /home/ec2-user/
        # Если папка уже есть — обновляем, иначе клонируем
        if [ -d "motokonig" ]; then
          cd motokonig
          git fetch --all
          git reset --hard origin/main
        else
          git clone https://gitlab.com/motokonig/mk-backend/api-service.git motokonig
          cd motokonig
        fi
        docker compose pull
        docker compose down
        docker compose up -d --remove-orphans
        sleep 5
        docker compose exec -T backend alembic upgrade head
      EOF